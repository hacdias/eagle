<nav id='navbar' class='full-width'>
  <input type="checkbox" id="toggler">
  <ul>
    <label for="toggler"><a class='no-link'>🍔 Menu</a></label>
    {{ range .Site.Menus.main -}}
      <li>
        <a href='{{ .URL }}' class='no-link'>
          <span>{{ with .Page }}{{ .Params.emoji }}{{ end}}</span>
          <span>{{ .Name }}</span>
        </a>
      </li>
    {{end}}
  </ul>
</nav>
