{{ define "main" }}

<main role='main'>
  <h1>{{ .Title }}</h1>

  {{- with .Content }}
    <div class='copy'>{{ . }}</div>
  {{- end }}

  <div class='copy'>
    <ul class='h-feed'>
      {{- $pages := (partialCached "get-pages" . .Type .Title) -}}
      {{- range $pages -}}
      <li class='h-entry'>
        <a class='u-url p-name' href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
      {{- end -}}
    </ul>
  </div>
</main>

{{ end }}
